<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg"><title style="font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;">Safety &amp; Trust engine — architecture</title><desc style="font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;">A CI trigger or CLI fans out to three red-team stages (garak via a Docker sidecar, AgentDojo via an Inspect eval, PyRIT in-process). Each normalises to ProbeResult(category, attempts, hits); findings feed a compliance mapper, then a tolerance gate that branches to pass or fail, each emitting an evidence artifact in runs/.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>

<g onclick="sendPrompt('What triggers the safety pipeline?')">
<rect x="240" y="22" width="200" height="46" rx="8" style="fill:rgb(68,68,65);stroke:rgb(180,178,169);stroke-width:0.5px"/>
<text x="340" y="40" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211,209,199);font-size:14px;font-weight:500">CI trigger / CLI</text>
<text x="340" y="56" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,178,169);font-size:11px">safety-engine --stages …</text>
</g>

<line x1="340" y1="68" x2="142" y2="106" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="340" y1="68" x2="340" y2="106" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="340" y1="68" x2="538" y2="106" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('What does the garak stage do?')">
<rect x="32" y="108" width="176" height="72" rx="8" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="120" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:14px;font-weight:500">garak scan</text>
<text x="120" y="144" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:11px">Broad vuln probes</text>
<text x="120" y="162" text-anchor="middle" dominant-baseline="central" style="fill:rgb(120,200,175);font-size:10px">Docker sidecar → report ingest</text>
</g>
<g onclick="sendPrompt('What does the AgentDojo stage do?')">
<rect x="252" y="108" width="176" height="72" rx="8" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="340" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:14px;font-weight:500">AgentDojo suite</text>
<text x="340" y="144" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:11px">Tool-injection tests</text>
<text x="340" y="162" text-anchor="middle" dominant-baseline="central" style="fill:rgb(120,200,175);font-size:10px">Inspect eval → .eval ingest</text>
</g>
<g onclick="sendPrompt('What does the PyRIT stage do?')">
<rect x="472" y="108" width="176" height="72" rx="8" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="560" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:14px;font-weight:500">PyRIT campaign</text>
<text x="560" y="144" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:11px">Multi-turn attacks</text>
<text x="560" y="162" text-anchor="middle" dominant-baseline="central" style="fill:rgb(120,200,175);font-size:10px">in-process campaign</text>
</g>

<line x1="120" y1="180" x2="300" y2="214" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="340" y1="180" x2="340" y2="214" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="560" y1="180" x2="380" y2="214" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('How are findings normalised?')">
<rect x="170" y="216" width="340" height="30" rx="15" style="fill:rgb(48,48,46);stroke:rgb(140,138,131);stroke-width:0.5px"/>
<text x="340" y="231" text-anchor="middle" dominant-baseline="central" style="fill:rgb(200,198,190);font-size:11px">each stage → ProbeResult(category, attempts, hits)</text>
</g>

<line x1="340" y1="246" x2="340" y2="272" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('How does the compliance mapper work?')">
<rect x="210" y="274" width="260" height="54" rx="8" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px"/>
<text x="340" y="293" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-size:14px;font-weight:500">Compliance mapper</text>
<text x="340" y="311" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:11px">probe → control → evidence (pass / fail / not_evidenced)</text>
</g>

<line x1="340" y1="328" x2="340" y2="356" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('What is the impact-tolerance gate?')">
<rect x="248" y="358" width="184" height="54" rx="8" style="fill:rgb(99,56,6);stroke:rgb(239,159,39);stroke-width:0.5px"/>
<text x="340" y="377" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250,199,117);font-size:14px;font-weight:500">Tolerance gate</text>
<text x="340" y="395" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239,159,39);font-size:11px">worst ASR ≤ tolerance?</text>
</g>

<line x1="310" y1="412" x2="200" y2="450" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="370" y1="412" x2="480" y2="450" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('What happens when the gate passes?')">
<rect x="70" y="452" width="210" height="56" rx="8" style="fill:rgb(39,80,10);stroke:rgb(151,196,89);stroke-width:0.5px"/>
<text x="175" y="472" text-anchor="middle" dominant-baseline="central" style="fill:rgb(192,221,151);font-size:14px;font-weight:500">Pass → exit 0 / merge</text>
<text x="175" y="491" text-anchor="middle" dominant-baseline="central" style="fill:rgb(151,196,89);font-size:11px">Evidence artifact (runs/)</text>
</g>
<g onclick="sendPrompt('What happens when the gate fails?')">
<rect x="400" y="452" width="210" height="56" rx="8" style="fill:rgb(121,31,31);stroke:rgb(240,149,149);stroke-width:0.5px"/>
<text x="505" y="472" text-anchor="middle" dominant-baseline="central" style="fill:rgb(247,193,193);font-size:14px;font-weight:500">Fail → exit 1 / block</text>
<text x="505" y="491" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,149,149);font-size:11px">Findings + remediation</text>
</g>
</svg>
