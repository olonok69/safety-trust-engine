<svg width="100%" viewBox="0 0 820 470" role="img" xmlns="http://www.w3.org/2000/svg"><title style="font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;">Safety &amp; Trust engine — GitHub Actions CI/CD</title><desc style="font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;">The safety-trust.yml workflow. On every PR or push to main it runs three jobs: lint-and-test (ruff + pytest), demo-gate (a self-test that the gate blocks — exit 1 is expected), and safety-gate (the enforcing check — it runs the impact-tolerance gate against committed baseline evidence and lets the exit code decide). Positive case: evidence within tolerance, gate exits 0, the check is green and the PR is mergeable. Negative case: a change breaches a tolerance, the gate exits 1, the safety-gate check goes red and (with branch protection) blocks the merge. On the nightly cron or manual dispatch the live job builds the garak sidecar, scans the model, runs the full gate over garak + AgentDojo + PyRIT, and uploads the evidence artifact.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>

<g onclick="sendPrompt('What triggers the safety-trust workflow?')">
<rect x="300" y="16" width="220" height="50" rx="8" style="fill:rgb(68,68,65);stroke:rgb(180,178,169);stroke-width:0.5px"/>
<text x="410" y="35" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211,209,199);font-size:14px;font-weight:500">GitHub Actions — safety-trust.yml</text>
<text x="410" y="53" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,178,169);font-size:11px">PR · push(main) · nightly cron · dispatch</text>
</g>

<line x1="360" y1="66" x2="225" y2="92" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="460" y1="66" x2="625" y2="92" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- LEFT LANE: every PR / push -->
<rect x="110" y="94" width="220" height="30" rx="6" style="fill:rgb(40,52,78);stroke:rgb(150,170,220);stroke-width:0.5px"/>
<text x="220" y="109" text-anchor="middle" dominant-baseline="central" style="fill:rgb(186,206,244);font-size:12px;font-weight:500">on: pull_request · push(main)</text>

<g onclick="sendPrompt('What does the lint-and-test job do?')">
<rect x="110" y="138" width="220" height="44" rx="8" style="fill:rgb(28,52,84);stroke:rgb(126,166,224);stroke-width:0.5px"/>
<text x="220" y="153" text-anchor="middle" dominant-baseline="central" style="fill:rgb(186,206,244);font-size:13px;font-weight:500">job: lint-and-test</text>
<text x="220" y="170" text-anchor="middle" dominant-baseline="central" style="fill:rgb(126,166,224);font-size:11px">uv sync · ruff · pytest (34)</text>
</g>
<line x1="220" y1="124" x2="220" y2="136" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('What does the demo-gate job verify?')">
<rect x="110" y="196" width="220" height="44" rx="8" style="fill:rgb(28,52,84);stroke:rgb(126,166,224);stroke-width:0.5px"/>
<text x="220" y="211" text-anchor="middle" dominant-baseline="central" style="fill:rgb(186,206,244);font-size:13px;font-weight:500">job: demo-gate (self-test)</text>
<text x="220" y="228" text-anchor="middle" dominant-baseline="central" style="fill:rgb(126,166,224);font-size:11px">gate must block — exit 1 expected</text>
</g>
<line x1="220" y1="182" x2="220" y2="194" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('What does the enforcing safety-gate job do?')">
<rect x="110" y="254" width="220" height="50" rx="8" style="fill:rgb(99,56,6);stroke:rgb(239,159,39);stroke-width:1px"/>
<text x="220" y="270" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250,199,117);font-size:13px;font-weight:600">job: safety-gate (enforcing)</text>
<text x="220" y="288" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239,159,39);font-size:11px">gate vs baseline evidence → exit code blocks build</text>
</g>
<line x1="220" y1="240" x2="220" y2="252" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- pass / fail fork -->
<line x1="180" y1="304" x2="128" y2="338" marker-end="url(#arrow)" style="stroke:rgb(151,196,89);stroke-width:1.5px"/>
<line x1="260" y1="304" x2="312" y2="338" marker-end="url(#arrow)" style="stroke:rgb(240,149,149);stroke-width:1.5px"/>
<text x="120" y="324" text-anchor="middle" style="fill:rgb(151,196,89);font-size:10px">within tol</text>
<text x="322" y="324" text-anchor="middle" style="fill:rgb(240,149,149);font-size:10px">breach</text>

<g onclick="sendPrompt('What happens when the gate passes a PR?')">
<rect x="36" y="340" width="172" height="58" rx="8" style="fill:rgb(39,80,10);stroke:rgb(151,196,89);stroke-width:0.5px"/>
<text x="122" y="358" text-anchor="middle" dominant-baseline="central" style="fill:rgb(192,221,151);font-size:12px;font-weight:500">PASS · exit 0</text>
<text x="122" y="375" text-anchor="middle" dominant-baseline="central" style="fill:rgb(151,196,89);font-size:10px">check ✓ → PR mergeable</text>
<text x="122" y="389" text-anchor="middle" dominant-baseline="central" style="fill:rgb(151,196,89);font-size:10px">evidence uploaded</text>
</g>
<g onclick="sendPrompt('What happens when the gate fails a PR?')">
<rect x="232" y="340" width="172" height="58" rx="8" style="fill:rgb(121,31,31);stroke:rgb(240,149,149);stroke-width:0.5px"/>
<text x="318" y="358" text-anchor="middle" dominant-baseline="central" style="fill:rgb(247,193,193);font-size:12px;font-weight:500">FAIL · exit 1</text>
<text x="318" y="375" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,149,149);font-size:10px">check ✗ → merge blocked*</text>
<text x="318" y="389" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,149,149);font-size:10px">breaching category + remediation</text>
</g>

<!-- RIGHT LANE: nightly / dispatch live -->
<rect x="515" y="94" width="220" height="30" rx="6" style="fill:rgb(40,52,78);stroke:rgb(150,170,220);stroke-width:0.5px"/>
<text x="625" y="109" text-anchor="middle" dominant-baseline="central" style="fill:rgb(186,206,244);font-size:12px;font-weight:500">on: schedule · workflow_dispatch</text>

<g onclick="sendPrompt('What does the live job do?')">
<rect x="515" y="138" width="220" height="26" rx="6" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px"/>
<text x="625" y="151" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-size:11px;font-weight:600">job: live (needs OPENAI_API_KEY)</text>
</g>
<line x1="625" y1="124" x2="625" y2="136" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="515" y="170" width="220" height="30" rx="7" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="625" y="185" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:11px">uv sync --extra live</text>
<line x1="625" y1="164" x2="625" y2="168" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="515" y="206" width="220" height="30" rx="7" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="625" y="221" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:11px">docker build -t safety-garak</text>
<line x1="625" y1="200" x2="625" y2="204" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="515" y="242" width="220" height="30" rx="7" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="625" y="257" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:11px">garak scan → garak.report.jsonl</text>
<line x1="625" y1="236" x2="625" y2="240" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="515" y="278" width="220" height="30" rx="7" style="fill:rgb(99,56,6);stroke:rgb(239,159,39);stroke-width:0.5px"/>
<text x="625" y="293" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250,199,117);font-size:11px">full gate: garak+agentdojo+pyrit</text>
<line x1="625" y1="272" x2="625" y2="276" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('Where does the nightly evidence go?')">
<rect x="515" y="314" width="220" height="44" rx="8" style="fill:rgb(48,48,46);stroke:rgb(140,138,131);stroke-width:0.5px"/>
<text x="625" y="330" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,199);font-size:12px;font-weight:500">upload live-evidence</text>
<text x="625" y="347" text-anchor="middle" dominant-baseline="central" style="fill:rgb(150,148,141);font-size:10px">artifact: runs/ (pass or fail)</text>
</g>
<line x1="625" y1="308" x2="625" y2="312" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<text x="410" y="424" text-anchor="middle" style="fill:rgb(150,148,141);font-size:11px">safety-gate ingests committed baseline evidence (no keys) — green within tolerance, red on a breach. demo-gate only proves the gate mechanism blocks.</text>
<text x="410" y="442" text-anchor="middle" style="fill:rgb(150,148,141);font-size:11px">*A red check is always visible; to make it actually prevent the merge, require the safety-gate check in branch protection on main.</text>
</svg>
