<svg width="100%" viewBox="0 0 760 540" role="img" xmlns="http://www.w3.org/2000/svg"><title style="font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;">Safety &amp; Trust engine — GitHub Actions CI/CD</title><desc style="font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;">The safety-trust.yml workflow. On every PR or push to main it runs lint-and-test (ruff + pytest) and demo-gate (offline gate, expected to exit 1, evidence uploaded). On the nightly cron or manual dispatch it runs the live job: sync the live extra, build the garak Docker sidecar, scan the model, then run the full gate over garak + AgentDojo + PyRIT and upload the evidence artifact.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>

<g onclick="sendPrompt('What triggers the safety-trust workflow?')">
<rect x="260" y="18" width="240" height="50" rx="8" style="fill:rgb(68,68,65);stroke:rgb(180,178,169);stroke-width:0.5px"/>
<text x="380" y="37" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211,209,199);font-size:14px;font-weight:500">GitHub Actions — safety-trust.yml</text>
<text x="380" y="55" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,178,169);font-size:11px">PR · push(main) · nightly cron · workflow_dispatch</text>
</g>

<line x1="320" y1="68" x2="195" y2="96" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="440" y1="68" x2="575" y2="96" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- LEFT LANE: every PR / push -->
<rect x="90" y="98" width="210" height="32" rx="6" style="fill:rgb(40,52,78);stroke:rgb(150,170,220);stroke-width:0.5px"/>
<text x="195" y="114" text-anchor="middle" dominant-baseline="central" style="fill:rgb(186,206,244);font-size:12px;font-weight:500">on: pull_request · push(main)</text>

<g onclick="sendPrompt('What does the lint-and-test job do?')">
<rect x="90" y="148" width="210" height="58" rx="8" style="fill:rgb(28,52,84);stroke:rgb(126,166,224);stroke-width:0.5px"/>
<text x="195" y="167" text-anchor="middle" dominant-baseline="central" style="fill:rgb(186,206,244);font-size:13px;font-weight:500">job: lint-and-test</text>
<text x="195" y="186" text-anchor="middle" dominant-baseline="central" style="fill:rgb(126,166,224);font-size:11px">uv sync · ruff check · pytest (34)</text>
</g>
<line x1="195" y1="130" x2="195" y2="146" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('What does the demo-gate job verify?')">
<rect x="90" y="224" width="210" height="58" rx="8" style="fill:rgb(99,56,6);stroke:rgb(239,159,39);stroke-width:0.5px"/>
<text x="195" y="243" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250,199,117);font-size:13px;font-weight:500">job: demo-gate</text>
<text x="195" y="262" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239,159,39);font-size:11px">--demo → expect exit 1</text>
</g>
<line x1="195" y1="206" x2="195" y2="222" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('What must be green to merge?')">
<rect x="90" y="300" width="210" height="50" rx="8" style="fill:rgb(39,80,10);stroke:rgb(151,196,89);stroke-width:0.5px"/>
<text x="195" y="318" text-anchor="middle" dominant-baseline="central" style="fill:rgb(192,221,151);font-size:13px;font-weight:500">Required check → merge</text>
<text x="195" y="337" text-anchor="middle" dominant-baseline="central" style="fill:rgb(151,196,89);font-size:11px">upload demo-evidence</text>
</g>
<line x1="195" y1="282" x2="195" y2="298" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- RIGHT LANE: nightly / dispatch live -->
<rect x="475" y="98" width="210" height="32" rx="6" style="fill:rgb(40,52,78);stroke:rgb(150,170,220);stroke-width:0.5px"/>
<text x="580" y="114" text-anchor="middle" dominant-baseline="central" style="fill:rgb(186,206,244);font-size:12px;font-weight:500">on: schedule · workflow_dispatch</text>

<g onclick="sendPrompt('What does the live job do?')">
<rect x="475" y="146" width="210" height="28" rx="6" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px"/>
<text x="580" y="160" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-size:12px;font-weight:600">job: live (needs OPENAI_API_KEY)</text>
</g>
<line x1="580" y1="130" x2="580" y2="144" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="475" y="184" width="210" height="34" rx="7" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="580" y="201" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:11px">uv sync --extra live</text>
<line x1="580" y1="174" x2="580" y2="182" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="475" y="228" width="210" height="34" rx="7" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="580" y="245" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:11px">docker build -t safety-garak</text>
<line x1="580" y1="218" x2="580" y2="226" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="475" y="272" width="210" height="34" rx="7" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px"/>
<text x="580" y="289" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:11px">garak scan → garak.report.jsonl</text>
<line x1="580" y1="262" x2="580" y2="270" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<rect x="475" y="316" width="210" height="34" rx="7" style="fill:rgb(99,56,6);stroke:rgb(239,159,39);stroke-width:0.5px"/>
<text x="580" y="333" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250,199,117);font-size:11px">full gate: garak+agentdojo+pyrit</text>
<line x1="580" y1="306" x2="580" y2="314" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<g onclick="sendPrompt('Where does the nightly evidence go?')">
<rect x="475" y="360" width="210" height="50" rx="8" style="fill:rgb(48,48,46);stroke:rgb(140,138,131);stroke-width:0.5px"/>
<text x="580" y="378" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,199);font-size:13px;font-weight:500">upload live-evidence</text>
<text x="580" y="397" text-anchor="middle" dominant-baseline="central" style="fill:rgb(150,148,141);font-size:11px">artifact: runs/ (pass or fail)</text>
</g>
<line x1="580" y1="350" x2="580" y2="358" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<text x="380" y="450" text-anchor="middle" style="fill:rgb(150,148,141);font-size:11px">Offline lane needs no keys (runs anywhere); the live lane runs only on cron / dispatch and needs the OPENAI_API_KEY repo secret.</text>
<text x="380" y="470" text-anchor="middle" style="fill:rgb(150,148,141);font-size:11px">garak is openai-v0-bound, so it runs as an isolated Docker sidecar; its JSONL report is ingested via --garak-report.</text>
</svg>
